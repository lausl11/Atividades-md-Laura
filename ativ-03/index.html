<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
    <form action="cadastro">
        <h1>cadastro</h1>
        <label for="nome">nome</label>
        <input type="text" id="nome">

        <label for="email">email</label>
        <input type="text" id="email">

        <label for="senha">senha</label>
        <input type="text" id="senha">

        <button type="submit">cadastar</button>
    </form>

    <form action="tarefa">
        <h1>tarefa</h1>

        <label for="titulo">tarefa</label>
        <input type="text" id="tarefa">

        <label for="descrisao">descrisao</label>
        <input type="text" id="descrisao">

        <label for="prioridade">prioridade</label>
        <select name="prioridade" id="prioridade">
            <option value="superfulo">superfulo</option>
            <option value="mediano">mediano</option>
            <option value="relevancia maxima">relevancia maxima</option>
        </select>

           <button type="submit">cadastar</button>
    </form>

    <form action="reserva">
        <h1>reserva</h1>

        <label for="espaço">espaço</label>
        <input type="text" id="reserva">

        <label for="horario">horario</label>
        <input type="text" id="descrisao">

        <label for="prioridade">tuma</label>
        <input type="text" id="turma">

        <button type="submit">reservar</button>
    </form>


     <form action="reserva">
        <h1>login</h1>

        <label for="email">email</label>
        <input type="text" id="email">

        <label for="senha">senha</label>
        <input type="text" id="senha">

        <button type="submit">login</button>
    </form>

    <form action="ouvidoria">
        <h1>ouvidoria</h1>

        <label for="assunto">assunto</label>
        <input type="text" id="assunto">

        <label for="descrisao">descrisao</label>
        <input type="text" id="descrisao">

        <button type="submit">enviar</button>
    </form>
</body>
</html>
